    - name: remove directory and content 
      ansible.builtin.file:
        path: "{{ app_loc }}"
        state: absent

    - name: Create a directory
      ansible.builtin.file:
        path: "{{ app_loc }}"
        state: directory
        
    - name: download and extract
      ansible.builtin.unarchive:
        src: https://expense-artifacts.s3.amazonaws.com/{{ component }}.zip
        dest: "{{ app_loc }}"
        remote_src: yes